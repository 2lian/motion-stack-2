[tool.setuptools.packages.find]
include = ["ms_zenoh_bridge", "ms_zenoh_bridge.*"]

[tool.setuptools.package-data]
"ms_zenoh_bridge" = [
  "py.typed",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"


