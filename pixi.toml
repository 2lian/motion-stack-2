[workspace]
authors = ["Neppel Elian <elian.neppel@posteo.eu>"]
channels = ["conda-forge"]
name = "motion-stack-2"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[pypi-dependencies]
motion_stack = {path = "./src/motion_stack/", editable=true}
ms_moonbot_zero = {path = "./src/ms_moonbot_zero/", editable=true}

[dependencies]
python = ">=3.14.3,<3.15"
uv = "*"
pyright = "*"
isort = "*"
black = "*"
glow-md = "*"
pytest = ">=9.0.2,<10"
mypy = ">=1.19.1,<2"
pytest-asyncio = ">=1.3.0,<2"
rerun-sdk = ">=0.31.1,<0.32"
